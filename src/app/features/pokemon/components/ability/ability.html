<div class="ability-container" [transparency]="isTransparent()">
    <span class="ability-title"> ABILITIES </span>
    <app-flex>
    @for (ability of abilities(); track $index) {
    
        <button class="ability-button">  
            <a routerLink='../ability/{{ability.ability.name}}'>
                <span> {{ability.ability.name.split('-').join(' ') | capitalizeWords }}</span>    
            </a>    
        </button>
    
    }
    </app-flex> 
</div>
