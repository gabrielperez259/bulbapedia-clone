@if(data.pokemonDetailsLoading()){
    <p> loading... </p>

}@else if (data.pokemonDetailsError()) {
    <p> error </p> 

}@else {    
    <div class="pokemon-details-container" >
        <app-flex>
            <div class="side-bar-container">
                <app-side-bar [pokemon]="data.pokemonDetails()"></app-side-bar>  
            </div>
            <div class="router-container">
                <router-outlet></router-outlet>
            </div>          
            <div class="card-container">
                <app-pokemon-details-card [pokemon]="data.pokemonDetails()"/>       
            </div>            
        </app-flex>

    </div>    
   
    
}
