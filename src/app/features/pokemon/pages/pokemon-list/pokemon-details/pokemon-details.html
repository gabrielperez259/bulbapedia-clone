@if(pokemonDetailsData.pokemonDetailsLoading()){
    <p> loading... </p>

}@else if (pokemonDetailsData.pokemonDetailsError()) {
    <p> error </p> 

}@else {    
    
    <div class="pokemon-details-container" >
        <app-flex>
            <div class="side-bar-container">
                <app-side-bar [pokemon]="pokemonDetailsData.pokemonDetails()"></app-side-bar>  
            </div>
            <div class="router-container">
                <div class="search-container">
                    <app-selection-bar
                        [labelText] = "'Variations: '"
                        [initialValue]="this.pokemonDetailsData.pokemonName()!"
                        [values]="this.speciesDetailsData.varietiesNames()!"
                        (selectedOptionOutput)="this.pokemonDetailsData.search.set($event)"
                    />
                </div>



               

                <router-outlet></router-outlet>
            </div>          
            <div class="card-container">
                <app-pokemon-details-card [pokemon]="pokemonDetailsData.pokemonDetails()"/>       
            </div>            
        </app-flex>

    </div>    
   
    
}
