@if(data.pokemonDetailsLoading()){
    <p> loading... </p>

}@else if (data.pokemonDetailsError()) {
    <p> error </p> 

}@else {    
    <div class="pokemon-details-container" [style.background-color]="data.pokemonDetails()!.types[0].type.name | capitalizeWords | colorType">
        <app-pokemon-details-card [pokemon]="data.pokemonDetails()"/>
    </div>

        
   
    
}
