<div class="move-set-container">
    <div class="container">
        <div class="search-container">
            <div class="selection-bar-container">
                <app-selection-bar
                    [labelText]="'Learn Method: '"
                    [initialValue]="this.initialLearnMethod()"
                    [values]="this.learnMethods()"
                    (selectedOptionOutput)="this.setLearnMethodValue($event)"
                />
            </div>
            <div class="selection-bar-container">
                <app-selection-bar 
                    [labelText]="'Game Version: '"
                    [initialValue]="this.initialVersion()"
                    [values]="this.versions()" 
                    (selectedOptionOutput)="this.setGenMoveValue($event)"
                />
            </div>
    </div>    
    <table>
        <thead>
            <tr>
                <th>Level</th>             
                <th>Move</th>       
                <th>Type</th>
                <th>Cat </th>
                <th>Pwr</th>
                <th>Acc</th>
                <th>PP</th>   
            </tr>
        </thead>
        <tbody>
            @for (move of this.computedMoveList(); track $index) {
                <tr app-pokemon-move-details 
                    [moveName]="move.move.name" 
                    [learnedAtLevel]="move.level"
                    [learnMethod]="move.method"> 
                </tr>
            }   

        </tbody>
    </table>    
</div>
