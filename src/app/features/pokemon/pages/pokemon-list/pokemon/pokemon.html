@if(data.pokemonDetailsLoading()){
    <p> loading... </p>

}@else if (data.pokemonDetailsError()) {
    <p> error </p> 

}@else {
    <div> {{data.pokemonDetails()!.name}}</div>
    <div>
    @for( type of data.pokemonDetails()!.types; track $index) {
        {{type.type.name}}
    
    }
    </div>
    <img src="{{data.pokemonDetails()!.sprites.front_default}}"> 


}
