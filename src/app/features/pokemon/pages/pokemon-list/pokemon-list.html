<div class="pokemon-list-container">
    <div class="header-container">
        <app-select-by-gen-bar (genValue)="setGenValue($event)"> </app-select-by-gen-bar>
        <app-search-bar (filterOutput)="this.search.set($event)"></app-search-bar>  
    </div>

    @if (data.pokemonListLoading()) {
        <p> loading... </p>

    }@else if (data.pokemonListError()) {
        <p> error... </p>
    }@else {
         <app-grid [columns]="6">
        @for(pokemon of this.filteredPokemonList(); track $index) {            
            @defer () {
                <app-pokemon-list-item [pokemon]="pokemon" [route]="pokemon.name"> </app-pokemon-list-item>
            }           
               

        }   
        </app-grid>
    }

</div>
